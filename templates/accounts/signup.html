{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:auto">
    <h2 style="margin-bottom:1.5rem">Create Account</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color:red;font-size:0.8rem;margin-top:-0.5rem;margin-bottom:0.5rem">{{ field.errors }}</p>
            {% endif %}
        {% endfor %}
        <button class="btn btn-primary" type="submit" style="width:100%;padding:0.75rem;margin-top:0.5rem">Sign Up</button>
    </form>
    <p style="margin-top:1rem;text-align:center;font-size:0.9rem">
        Already have an account? <a href="/accounts/login/">Login</a>
    </p>
</div>
{% endblock %}
